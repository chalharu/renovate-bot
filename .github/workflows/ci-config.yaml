name: Renovate config CI
'on':
  workflow_dispatch:
  pull_request:
    paths:
      - 'renovate.json5?'
      - '.github/renovate.json5?'
      - '.gitlab/renovate.json5?'
      - '.github/scripts/**'
      - '.github/zizmor.yml'
      - '.github/ghalint.yaml'
      - '.renovaterc'
      - '.renovaterc.json5?'
      - '.github/workflows/ci-config.yaml'
      - '.github/workflows/deploy-worker.yaml'
      - '.github/workflows/renovate.yaml'
      - 'worker/**'
      - 'package.json'
permissions:
  contents: read
jobs:
  build:
    permissions:
      contents: read
    # main
    uses: >-
      chalharu/workflows/.github/workflows/renovate-ci.yaml@80acd0f7698de276f45e09882e7e86b78ac23ce4
  workflow_helper_regression:
    name: Workflow helper regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Run repository workflow helper tests
        run: node --test .github/scripts/renovate-repositories.test.js
  rust_worker_regression:
    name: Rust Worker regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Cache Worker cargo artifacts
        # v4.2.4
        uses: >-
          actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            worker/target
          key: >-
            worker-ci-cargo-chef-${{ runner.os }}-${{ hashFiles('worker/Cargo.lock', 'worker/Cargo.toml') }}
          restore-keys: |
            worker-ci-cargo-chef-${{ runner.os }}-
      - name: Install Worker Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt --target wasm32-unknown-unknown
      - name: Use Worker Rust toolchain
        run: rustup default 1.95.0
      - name: Install cargo-chef
        run: cargo +1.95.0 install cargo-chef --locked
      - name: Prepare cargo-chef recipe
        run: cargo +1.95.0 chef prepare --recipe-path recipe.json
      - name: Cook host dependencies with cargo-chef
        run: cargo +1.95.0 chef cook --recipe-path recipe.json
      - name: Cook wasm dependencies with cargo-chef
        run: cargo +1.95.0 chef cook --recipe-path recipe.json --target wasm32-unknown-unknown --release
      - name: Check Rust formatting
        run: cargo +1.95.0 fmt --check
      - name: Check Rust Worker logic
        run: cargo +1.95.0 check
      - name: Check Cloudflare Worker target
        run: cargo +1.95.0 check --target wasm32-unknown-unknown
      - name: Run Rust tests
        run: cargo +1.95.0 test
      - name: Install Worker build tool
        run: cargo +1.95.0 install worker-build --locked
      - name: Build Cloudflare Worker
        run: worker-build --release
