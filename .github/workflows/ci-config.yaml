name: Renovate config CI
'on':
  workflow_dispatch:
  pull_request:
    paths:
      - 'renovate.json5?'
      - '.github/renovate.json5?'
      - '.gitlab/renovate.json5?'
      - '.github/scripts/**'
      - '.github/zizmor.yml'
      - '.github/ghalint.yaml'
      - '.renovaterc'
      - '.renovaterc.json5?'
      - '.github/workflows/ci-config.yaml'
      - '.github/workflows/renovate.yaml'
      - 'worker/**'
      - 'package.json'
permissions:
  contents: read
jobs:
  build:
    permissions:
      contents: read
    uses: chalharu/workflows/.github/workflows/renovate-ci.yaml@8e3667eafdd499f70651462a253512e231051043 # main
  workflow_helper_regression:
    name: Workflow helper regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run repository workflow helper tests
        run: node --test .github/scripts/renovate-repositories.test.js .github/scripts/renovate-stability-days.test.js
  ts_worker_regression:
    name: TypeScript Worker regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install Worker dependencies
        run: npm ci
      - name: Check TypeScript types
        run: npm run typecheck
      - name: Run Worker tests
        run: npm test
      - name: Build Worker (dry-run)
        run: npm run build
