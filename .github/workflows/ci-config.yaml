name: Renovate config CI
'on':
  workflow_dispatch:
  pull_request:
    paths:
      - 'renovate.json5?'
      - '.github/renovate.json5?'
      - '.gitlab/renovate.json5?'
      - '.github/scripts/**'
      - '.github/zizmor.yml'
      - '.github/ghalint.yaml'
      - '.renovaterc'
      - '.renovaterc.json5?'
      - '.github/workflows/ci-config.yaml'
      - '.github/workflows/deploy-worker.yaml'
      - '.github/workflows/renovate.yaml'
      - 'worker/**'
      - 'package.json'
permissions:
  contents: read
jobs:
  build:
    permissions:
      contents: read
    # main
    uses: >-
      chalharu/workflows/.github/workflows/renovate-ci.yaml@80acd0f7698de276f45e09882e7e86b78ac23ce4
  workflow_helper_regression:
    name: Workflow helper regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Run repository workflow helper tests
        run: node --test .github/scripts/renovate-repositories.test.js
  ts_worker_regression:
    name: TypeScript Worker regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Node.js
        # v4.4.0
        uses: >-
          actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install Worker dependencies
        run: npm ci
      - name: Check TypeScript types
        run: npm run typecheck
      - name: Run Worker tests
        run: npm test
      - name: Build Worker (dry-run)
        run: npm run build
