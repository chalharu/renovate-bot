name: Renovate config CI
'on':
  workflow_dispatch:
  pull_request:
    paths:
      - 'renovate.json5?'
      - '.github/renovate.json5?'
      - '.gitlab/renovate.json5?'
      - '.github/scripts/**'
      - '.github/zizmor.yml'
      - '.github/ghalint.yaml'
      - '.renovaterc'
      - '.renovaterc.json5?'
      - '.github/workflows/ci-config.yaml'
      - '.github/workflows/renovate.yaml'
      - 'worker/**'
      - 'package.json'
permissions:
  contents: read
jobs:
  build:
    permissions:
      contents: read
    uses: chalharu/workflows/.github/workflows/renovate-ci.yaml@b6ed9236b147776573759591037eab1409766f2b # main
  workflow_helper_regression:
    name: Workflow helper regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run repository workflow helper tests
        run: node --test .github/scripts/renovate-repositories.test.js .github/scripts/renovate-stability-days.test.js
  ts_worker_regression:
    name: TypeScript Worker regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install Worker dependencies
        run: npm ci
      - name: Check TypeScript types
        run: npm run typecheck
      - name: Run Worker tests
        run: npm test
      - name: Build Worker (dry-run)
        run: npm run build
