name: Renovate config CI
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'renovate.json5?'
      - '.github/renovate.json5?'
      - '.gitlab/renovate.json5?'
      - '.github/scripts/**'
      - '.renovaterc'
      - '.renovaterc.json5?'
      - '.github/workflows/ci-config.yaml'
      - '.github/workflows/renovate.yaml'
      - 'worker/**'
      - 'README.md'
      - 'package.json'
permissions:
  contents: read
jobs:
  build:
    permissions:
      contents: read
    uses: chalharu/workflows/.github/workflows/renovate-ci.yaml@80acd0f7698de276f45e09882e7e86b78ac23ce4 # main
  workflow_helper_regression:
    name: Workflow helper regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run repository workflow helper tests
        run: node --test .github/scripts/renovate-repositories.test.js
  rust_worker_regression:
    name: Rust Worker regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Worker target
        run: rustup target add wasm32-unknown-unknown
      - name: Check Rust formatting
        run: cargo fmt --check
      - name: Check Rust Worker logic
        run: cargo check
      - name: Check Cloudflare Worker target
        run: cargo check --target wasm32-unknown-unknown
      - name: Run Rust tests
        run: cargo test
      - name: Install Worker build tool
        run: cargo install worker-build --locked
      - name: Build Cloudflare Worker
        run: worker-build --release
