name: Renovate merge gate

on:
  workflow_dispatch:
    inputs:
      active_branches:
        description: JSON array of branch names that Renovate still considers active for the targeted repository
        required: false
        type: string
      active_branches_known:
        description: Whether the provided active branch list is authoritative for the targeted repository
        required: false
        type: string
      branch_updates:
        description: JSON array of distilled branch metadata extracted from the latest Renovate run for the targeted repository
        required: false
        type: string
      branch_updates_known:
        description: Whether the provided branch metadata is authoritative for the targeted repository
        required: false
        type: string
      repository:
        description: Repository name to refresh immediately
        required: false
        type: string
  schedule:
  - cron: '*/5 * * * *'

concurrency:
  group: renovate-merge-gate-${{ github.event.inputs.repository || 'all' }}

jobs:
  manage_gate:
    name: manage gate
    runs-on: ubuntu-latest
    steps:
    - name: Get token
      id: get_token
      uses: actions/create-github-app-token@v3.0.0
      with:
        private-key: ${{ secrets.PRIVATE_KEY }}
        app-id: ${{ secrets.APP_ID }}
        owner: ${{ github.repository_owner }}

    - name: Checkout repository
      uses: actions/checkout@v4.2.2

    - name: Manage Renovate pull requests
      uses: actions/github-script@v8.0.0
      with:
        github-token: ${{ steps.get_token.outputs.token }}
        script: |
          const path = require("node:path");
          const { calculateWaitCheckState } = require(
            path.join(process.env.GITHUB_WORKSPACE, ".github/scripts/renovate-merge-gate-wait.js"),
          );
          const WAIT_CHECK_NAME = "Renovate wait period";
          const SUPPORTED_CONFIG_PATHS = [
            "renovate.json",
            "renovate.json5",
            ".github/renovate.json",
            ".github/renovate.json5",
            ".gitlab/renovate.json",
            ".gitlab/renovate.json5",
            ".renovaterc",
            ".renovaterc.json",
            ".renovaterc.json5",
          ];
          const SUCCESSFUL_CHECK_CONCLUSIONS = new Set(["success", "neutral", "skipped"]);
          const SUCCESSFUL_STATUS_STATES = new Set(["SUCCESS"]);
          const WAIT_LABELS = new Set(["security"]);
          const WAIT_LABEL_PATTERN = /^renovate-gate-wait-(\d+)d$/;
          // pruneStaleBranches=false keeps Renovate PRs alive across rebases, so rebases must not reset the gate.
          const WAIT_PERIOD_STARTS_AT_PULL_REQUEST_CREATION = true;
          const failures = [];
          const summary = {
            repositories: 0,
            autoclosedPullRequests: 0,
            relabeledPullRequests: 0,
            renovatePullRequests: 0,
            ignoredPullRequests: 0,
            waitingPullRequests: 0,
            mergedPullRequests: 0,
            skippedPullRequests: 0,
          };

          const hasSupportedRenovateConfig = async (repository) => {
            for (const path of SUPPORTED_CONFIG_PATHS) {
              try {
                await github.rest.repos.getContent({
                  owner: repository.owner.login,
                  repo: repository.name,
                  path,
                });
                return true;
              } catch (error) {
                if (error.status === 404) {
                  continue;
                }

                throw new Error(`Unable to determine repository eligibility (status: ${error.status ?? "unknown"})`);
              }
            }

            return false;
          };

          const resolveWaitPolicy = (labelNames) => {
            const waitDays = labelNames
              .map((label) => WAIT_LABEL_PATTERN.exec(label))
              .filter(Boolean)
              .map((match) => Number(match[1]))
              .filter((value) => Number.isInteger(value) && value >= 0);

            if (waitDays.length === 0) {
              return null;
            }

            const effectiveWaitDays = Math.max(...waitDays);

            return {
              waitDays: effectiveWaitDays,
              waitWindowMs: effectiveWaitDays * 24 * 60 * 60 * 1000,
            };
          };

          const normalizeLabels = (labels) => Array.isArray(labels)
            ? labels
              .filter((label) => typeof label === "string" && label.trim().length > 0)
              .map((label) => label.trim())
            : [];

          const getPullRequestLabelNames = (pullRequest) => normalizeLabels(
            pullRequest.labels
              .map((label) => typeof label === "string" ? label : label.name),
          );

          const reconcileExpectedLabels = async ({ repository, pullRequest, expectedLabels }) => {
            const normalizedExpectedLabels = [
              ...new Set(normalizeLabels(expectedLabels)),
            ];

            if (normalizedExpectedLabels.length === 0) {
              return {
                labelNames: getPullRequestLabelNames(pullRequest).map((label) => label.toLowerCase()),
                relabeled: false,
              };
            }

            const existingLabelNames = getPullRequestLabelNames(pullRequest);
            const existingLowercaseLabels = new Set(
              existingLabelNames.map((label) => label.toLowerCase()),
            );
            const missingLabels = normalizedExpectedLabels.filter(
              (label) => !existingLowercaseLabels.has(label.toLowerCase()),
            );

            if (missingLabels.length === 0) {
              return {
                labelNames: existingLabelNames.map((label) => label.toLowerCase()),
                relabeled: false,
              };
            }

            try {
              const { data } = await github.rest.issues.addLabels({
                owner: repository.owner.login,
                repo: repository.name,
                issue_number: pullRequest.number,
                labels: missingLabels,
              });

              return {
                labelNames: normalizeLabels(
                  data.map((label) => typeof label === "string" ? label : label.name),
                ).map((label) => label.toLowerCase()),
                relabeled: true,
              };
            } catch (error) {
              core.warning(
                `Unable to reconcile labels for PR #${pullRequest.number}: ${error.message}`,
              );
              return {
                labelNames: existingLabelNames.map((label) => label.toLowerCase()),
                relabeled: false,
              };
            }
          };

          const sanitizeDepName = (depName) => depName
            .replace("@types/", "")
            .replace("@", "")
            .replace(/\//g, "-")
            .replace(/\s+/g, "-")
            .replace(/:/g, "-")
            .replace(/-+/g, "-")
            .toLowerCase();

          const parseNumericVersion = (version) => {
            if (typeof version !== "string") {
              return null;
            }

            const normalized = version.startsWith("v") ? version.slice(1) : version;
            const match = normalized.match(/^(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/);

            if (!match) {
              return null;
            }

            return {
              raw: version,
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
            };
          };

          const compareParsedVersions = (left, right) => {
            for (const key of ["major", "minor", "patch"]) {
              if (left[key] !== right[key]) {
                return left[key] - right[key];
              }
            }

            return 0;
          };

          const parseGithubSourceRepo = (sourceUrl) => {
            if (typeof sourceUrl !== "string") {
              return null;
            }

            const match = /^https?:\/\/github\.com\/([^/]+)\/([^/#?]+?)(?:\.git)?(?:[/?#].*)?$/i.exec(sourceUrl);

            if (!match) {
              return null;
            }

            return {
              owner: match[1],
              repo: match[2],
            };
          };

          const githubTagAvailabilityCache = new Map();

          const fetchPublicTagRef = async ({ owner, repo, tag }) => {
            const response = await fetch(
              `https://api.github.com/repos/${owner}/${repo}/git/ref/tags/${encodeURIComponent(tag)}`,
              {
                headers: {
                  Accept: "application/vnd.github+json",
                  "User-Agent": "renovate-merge-gate",
                },
              },
            );

            if (response.status === 200) {
              return true;
            }

            if (response.status === 404) {
              return false;
            }

            return null;
          };

          const tagExistsForVersion = async (sourceUrl, version) => {
            const sourceRepo = parseGithubSourceRepo(sourceUrl);

            if (!sourceRepo || typeof version !== "string") {
              return null;
            }

            const cacheKey = `${sourceRepo.owner}/${sourceRepo.repo}@${version}`;
            if (githubTagAvailabilityCache.has(cacheKey)) {
              return githubTagAvailabilityCache.get(cacheKey);
            }

            const candidateTags = new Set([
              version,
              version.startsWith("v") ? version.slice(1) : `v${version}`,
            ]);

            for (const tag of candidateTags) {
              try {
                await github.request("GET /repos/{owner}/{repo}/git/ref/tags/{tag}", {
                  owner: sourceRepo.owner,
                  repo: sourceRepo.repo,
                  tag,
                });
                githubTagAvailabilityCache.set(cacheKey, true);
                return true;
              } catch (error) {
                if (error.status !== 403 && error.status !== 404) {
                  throw error;
                }

                const publicResult = await fetchPublicTagRef({
                  owner: sourceRepo.owner,
                  repo: sourceRepo.repo,
                  tag,
                });
                if (publicResult === true) {
                  githubTagAvailabilityCache.set(cacheKey, true);
                  return true;
                }

                if (publicResult === null) {
                  githubTagAvailabilityCache.set(cacheKey, null);
                  return null;
                }
              }
            }

            githubTagAvailabilityCache.set(cacheKey, false);
            return false;
          };

          const inferInactiveBranchMetadata = (branchName, depStates) => {
            if (typeof branchName !== "string") {
              return null;
            }

            const normalized = branchName.startsWith("renovate/")
              ? branchName.slice("renovate/".length)
              : branchName;
            const newFormatMatch = normalized.match(/^(?<dep>.+?)__(?<updateType>major|minor|patch|pin|digest|pinDigest)(?:__v(?<version>.+?))?(?:__d(?<digest>[0-9a-f]+))?$/);

            if (newFormatMatch?.groups) {
              return {
                depKey: newFormatMatch.groups.dep ?? null,
                updateType: newFormatMatch.groups.updateType ?? null,
                targetVersion: newFormatMatch.groups.version ?? null,
                targetDigestShort: newFormatMatch.groups.digest ?? null,
              };
            }

            const depCandidates = Array.from(depStates.keys())
              .filter((depKey) =>
                normalized === depKey ||
                normalized.startsWith(`${depKey}-`) ||
                normalized.startsWith(`${depKey}__`),
              )
              .sort((left, right) => right.length - left.length);
            const depKey = depCandidates[0] ?? null;
            const suffix = depKey ? normalized.slice(depKey.length) : normalized;
            const versionMatch = suffix.match(/-(v?\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)*)$/);
            const digestMatch = suffix.match(/-([0-9a-f]{7,})$/);

            return {
              depKey,
              updateType: null,
              targetVersion: versionMatch ? versionMatch[1] : null,
              targetDigestShort: digestMatch ? digestMatch[1] : null,
            };
          };

          const evaluateInactiveBranch = async ({ pullRequest, depStates }) => {
            const inferred = inferInactiveBranchMetadata(pullRequest.head.ref, depStates);

            if (!inferred?.depKey || !inferred.targetVersion) {
              return {
                keep: false,
                reason: "the branch is no longer active in the latest Renovate run",
              };
            }

            const depState = depStates.get(inferred.depKey);
            if (!depState || typeof depState.currentVersion !== "string") {
              return {
                keep: false,
                reason: "the dependency no longer has active Renovate updates",
              };
            }

            const currentVersion = parseNumericVersion(depState.currentVersion);
            const targetVersion = parseNumericVersion(inferred.targetVersion);

            if (!currentVersion || !targetVersion) {
              return {
                keep: false,
                reason: "the branch is no longer active in the latest Renovate run",
              };
            }

            if (compareParsedVersions(targetVersion, currentVersion) <= 0) {
              return {
                keep: false,
                reason: `the target version ${inferred.targetVersion} is no longer newer than the current version ${depState.currentVersion}`,
              };
            }

            const isPatchLine =
              targetVersion.major === currentVersion.major &&
              targetVersion.minor === currentVersion.minor;

            if (!isPatchLine) {
              return {
                keep: false,
                reason: "the branch is no longer active in the latest Renovate run",
              };
            }

            const hasActivePatchOnSameLine = depState.branches.some((branchUpdate) => {
              if (branchUpdate.updateType !== "patch" || typeof branchUpdate.newVersion !== "string") {
                return false;
              }

              const activeTargetVersion = parseNumericVersion(branchUpdate.newVersion);
              return !!activeTargetVersion &&
                activeTargetVersion.major === currentVersion.major &&
                activeTargetVersion.minor === currentVersion.minor;
            });

            if (!hasActivePatchOnSameLine) {
              return {
                keep: false,
                reason: "no active patch update remains for this dependency line",
              };
            }

            const tagExists = await tagExistsForVersion(depState.sourceUrl, inferred.targetVersion);
            if (tagExists === false) {
              return {
                keep: false,
                reason: `the target release ${inferred.targetVersion} is no longer available upstream`,
              };
            }

            return {
              keep: true,
              reason: `custom separateMultiplePatch keeps ${inferred.targetVersion} open while newer patch updates remain available`,
            };
          };

          const autoclosePullRequest = async ({ repository, pullRequest, reason }) => {
            const title = pullRequest.title.endsWith("- autoclosed")
              ? pullRequest.title
              : `${pullRequest.title} - autoclosed`;
            let closedPullRequest = false;
            let deletedBranch = false;

            try {
              await github.rest.pulls.update({
                owner: repository.owner.login,
                repo: repository.name,
                pull_number: pullRequest.number,
                title,
                state: "closed",
              });
              closedPullRequest = true;
            } catch (error) {
              if (error.status !== 405 && error.status !== 409 && error.status !== 422) {
                throw error;
              }
            }

            try {
              await github.rest.git.deleteRef({
                owner: repository.owner.login,
                repo: repository.name,
                ref: `heads/${pullRequest.head.ref}`,
              });
              deletedBranch = true;
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) {
                throw error;
              }
            }

            if (closedPullRequest) {
              try {
                await github.rest.issues.createComment({
                  owner: repository.owner.login,
                  repo: repository.name,
                  issue_number: pullRequest.number,
                  body: `Autoclosed by the Renovate merge gate because ${reason}.`,
                });
              } catch (error) {
                core.warning(`Unable to add stale-close comment to PR #${pullRequest.number}: ${error.message}`);
              }
            }

            return closedPullRequest || deletedBranch;
          };

          const getHeadCommitTimestamp = async ({ repository, ref }) => {
            const { data } = await github.rest.repos.getCommit({
              owner: repository.owner.login,
              repo: repository.name,
              ref,
            });
            const latestTimestamp = data.commit?.committer?.date ?? data.commit?.author?.date;

            if (!latestTimestamp) {
              throw new Error("Unable to determine the latest Renovate head commit timestamp");
            }

            return latestTimestamp;
          };

          const upsertWaitCheck = async ({ repository, headSha, status, conclusion, title, details, createIfMissing = true }) => {
            const now = new Date().toISOString();
            const { data } = await github.rest.checks.listForRef({
              owner: repository.owner.login,
              repo: repository.name,
              ref: headSha,
              check_name: WAIT_CHECK_NAME,
              filter: "latest",
              per_page: 100,
            });
            const existing = data.check_runs.find((checkRun) => checkRun.name === WAIT_CHECK_NAME);
            const payload = {
              owner: repository.owner.login,
              repo: repository.name,
              name: WAIT_CHECK_NAME,
              status,
              started_at: now,
              output: {
                title,
                summary: details,
              },
            };

            if (status === "completed") {
              payload.conclusion = conclusion;
              payload.completed_at = now;
            }

            if (existing) {
              await github.rest.checks.update({
                owner: repository.owner.login,
                repo: repository.name,
                check_run_id: existing.id,
                name: payload.name,
                status: payload.status,
                started_at: payload.started_at,
                conclusion: payload.conclusion,
                completed_at: payload.completed_at,
                output: payload.output,
              });
              return;
            }

            if (!createIfMissing) {
              return;
            }

            payload.head_sha = headSha;
            await github.rest.checks.create(payload);
          };

          const evaluatePullRequestState = async ({ repository, pullRequestNumber }) => {
            const result = await github.graphql(
              `query($owner: String!, $repo: String!, $pullRequestNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pullRequestNumber) {
                    mergeable
                    commits(last: 1) {
                      nodes {
                        commit {
                          statusCheckRollup {
                            contexts(first: 100) {
                              nodes {
                                __typename
                                ... on CheckRun {
                                  name
                                  status
                                  conclusion
                                }
                                ... on StatusContext {
                                  context
                                  state
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }`,
              {
                owner: repository.owner.login,
                repo: repository.name,
                pullRequestNumber,
              },
            );

            const pullRequest = result.repository.pullRequest;
            const contexts = pullRequest.commits.nodes[0]?.commit.statusCheckRollup?.contexts?.nodes ?? [];
            const relevantContexts = contexts.filter((node) => {
              if (node.__typename === "CheckRun") {
                return node.name !== WAIT_CHECK_NAME && node.name !== "manage gate";
              }

              return node.context !== WAIT_CHECK_NAME;
            });

            if (relevantContexts.length === 0) {
              return {
                ready: false,
                reason: "No external CI checks found yet",
              };
            }

            const failingContexts = relevantContexts.filter((node) => {
              if (node.__typename === "CheckRun") {
                return node.status !== "COMPLETED" || !SUCCESSFUL_CHECK_CONCLUSIONS.has((node.conclusion ?? "").toLowerCase());
              }

              return !SUCCESSFUL_STATUS_STATES.has(node.state);
            });

            if (failingContexts.length > 0) {
              return {
                ready: false,
                reason: "Repository CI is not green yet",
              };
            }

            if (pullRequest.mergeable !== "MERGEABLE") {
              return {
                ready: false,
                reason: `Pull request is not mergeable yet (${pullRequest.mergeable})`,
              };
            }

            return {
              ready: true,
              reason: "Ready to merge",
            };
          };

          const requestedRepositoryName = (context.payload.inputs?.repository ?? "").trim();
          const activeBranchesKnown = (context.payload.inputs?.active_branches_known ?? "").trim().toLowerCase() === "true";
          const branchUpdatesKnown = (context.payload.inputs?.branch_updates_known ?? "").trim().toLowerCase() === "true";
          let activeBranchSet = null;
          const branchExpectedLabelsByName = new Map();
          const depStates = new Map();

          if (activeBranchesKnown && requestedRepositoryName) {
            try {
              const rawActiveBranches = (context.payload.inputs?.active_branches ?? "").trim();
              const parsedActiveBranches = JSON.parse(rawActiveBranches || "[]");

              if (!Array.isArray(parsedActiveBranches) || parsedActiveBranches.some((branch) => typeof branch !== "string")) {
                throw new Error("Active branch input must be a JSON array of strings");
              }

              activeBranchSet = new Set(parsedActiveBranches);
            } catch (error) {
              throw new Error(`Unable to parse active branch input: ${error.message}`);
            }
          }

          if (branchUpdatesKnown && requestedRepositoryName) {
            try {
              const rawBranchUpdates = (context.payload.inputs?.branch_updates ?? "").trim();
              const parsedBranchUpdates = JSON.parse(rawBranchUpdates || "[]");

              if (!Array.isArray(parsedBranchUpdates)) {
                throw new Error("Branch update input must be a JSON array");
              }

              for (const branchUpdate of parsedBranchUpdates) {
                if (!branchUpdate || typeof branchUpdate !== "object" || typeof branchUpdate.branchName !== "string") {
                  throw new Error("Each branch update must be an object with a branchName");
                }

                const expectedLabels = normalizeLabels(branchUpdate.expectedLabels);
                if (expectedLabels.length > 0) {
                  branchExpectedLabelsByName.set(
                    branchUpdate.branchName,
                    [
                      ...new Set([
                        ...(branchExpectedLabelsByName.get(branchUpdate.branchName) ?? []),
                        ...expectedLabels,
                      ]),
                    ].sort((left, right) => left.localeCompare(right)),
                  );
                }

                const depKey = typeof branchUpdate.depNameSanitized === "string" && branchUpdate.depNameSanitized.length > 0
                  ? branchUpdate.depNameSanitized
                  : typeof branchUpdate.depName === "string" && branchUpdate.depName.length > 0
                    ? sanitizeDepName(branchUpdate.depName)
                    : null;

                if (!depKey) {
                  continue;
                }

                const depState = depStates.get(depKey) ?? {
                  currentVersion: null,
                  sourceUrl: null,
                  branches: [],
                };

                if (!depState.currentVersion && typeof branchUpdate.currentVersion === "string") {
                  depState.currentVersion = branchUpdate.currentVersion;
                }

                if (!depState.sourceUrl && typeof branchUpdate.sourceUrl === "string") {
                  depState.sourceUrl = branchUpdate.sourceUrl;
                }

                depState.branches.push(branchUpdate);
                depStates.set(depKey, depState);
              }

              if (!activeBranchSet && depStates.size > 0) {
                activeBranchSet = new Set(
                  parsedBranchUpdates
                    .map((branchUpdate) => branchUpdate?.branchName)
                    .filter((branchName) => typeof branchName === "string"),
                );
              }
            } catch (error) {
              throw new Error(`Unable to parse branch update input: ${error.message}`);
            }
          }

          const repositories = requestedRepositoryName
            ? [
              (
                await github.rest.repos.get({
                  owner: context.repo.owner,
                  repo: requestedRepositoryName,
                })
              ).data,
            ]
            : await github.paginate("GET /installation/repositories", {
              per_page: 100,
            });
          const uniqueRepositories = [...new Map(
            repositories
              .filter((repository) =>
                repository.owner.login === context.repo.owner &&
                !repository.archived &&
                !repository.disabled,
              )
              .map((repository) => [repository.full_name, repository]),
          ).values()];
          const eligibleRepositories = [];

          for (const repository of uniqueRepositories) {
            if (!(await hasSupportedRenovateConfig(repository))) {
              continue;
            }

            if (repository.private) {
              core.setSecret(repository.full_name);
              core.setSecret(repository.name);
            }

            eligibleRepositories.push(repository);
          }

          summary.repositories = eligibleRepositories.length;

          for (const repository of eligibleRepositories) {
            try {
              const pullRequests = await github.paginate(github.rest.pulls.list, {
                owner: repository.owner.login,
                repo: repository.name,
                state: "open",
                per_page: 100,
              });

              for (const pullRequest of pullRequests) {
                const isRenovatePullRequest =
                  pullRequest.head.repo?.full_name === repository.full_name &&
                  pullRequest.head.ref.startsWith("renovate/") &&
                  (
                    /^renovate.*\[bot\]$/.test(pullRequest.user.login) ||
                    (pullRequest.body ?? "").includes("This PR has been generated by [Renovate Bot]")
                  );

                if (!isRenovatePullRequest) {
                  continue;
                }

                summary.renovatePullRequests += 1;

                if (activeBranchSet && !activeBranchSet.has(pullRequest.head.ref)) {
                  if (!branchUpdatesKnown && depStates.size === 0) {
                    summary.skippedPullRequests += 1;
                    continue;
                  }

                  const inactiveBranchDecision = await evaluateInactiveBranch({
                    pullRequest,
                    depStates,
                  });

                  if (!inactiveBranchDecision.keep) {
                    const wasAutoclosed = await autoclosePullRequest({
                      repository,
                      pullRequest,
                      reason: inactiveBranchDecision.reason,
                    });
                    if (wasAutoclosed) {
                      summary.autoclosedPullRequests += 1;
                    } else {
                      summary.skippedPullRequests += 1;
                    }
                    continue;
                  }
                }

                let labelNames = getPullRequestLabelNames(pullRequest)
                  .map((label) => label.toLowerCase());
                const expectedLabels = branchExpectedLabelsByName.get(pullRequest.head.ref) ?? [];

                if (expectedLabels.length > 0) {
                  const reconciliation = await reconcileExpectedLabels({
                    repository,
                    pullRequest,
                    expectedLabels,
                  });
                  labelNames = reconciliation.labelNames;
                  if (reconciliation.relabeled) {
                    summary.relabeledPullRequests += 1;
                  }
                }

                const waitPolicy = resolveWaitPolicy(labelNames);
                const isVulnerability =
                  labelNames.some((label) => WAIT_LABELS.has(label)) ||
                  /\[SECURITY\]/.test(`${pullRequest.title}\n${pullRequest.body ?? ""}`);

                if (!isVulnerability && !waitPolicy) {
                  await upsertWaitCheck({
                    repository,
                    headSha: pullRequest.head.sha,
                    status: "completed",
                    conclusion: "success",
                    title: "Wait policy not enabled",
                    details: "No repo-local Renovate gate label applies to this pull request.",
                    createIfMissing: false,
                  });
                  summary.ignoredPullRequests += 1;
                  continue;
                }

                const latestHeadUpdateAt = !WAIT_PERIOD_STARTS_AT_PULL_REQUEST_CREATION && !isVulnerability
                  ? await getHeadCommitTimestamp({
                    repository,
                    ref: pullRequest.head.sha,
                  })
                  : undefined;
                const waitCheckState = calculateWaitCheckState({
                  pullRequest,
                  latestHeadUpdateAt,
                  isVulnerability,
                  waitPolicy,
                  useCreationTime: WAIT_PERIOD_STARTS_AT_PULL_REQUEST_CREATION,
                });

                await upsertWaitCheck({
                  repository,
                  headSha: pullRequest.head.sha,
                  status: waitCheckState.waitSatisfied ? "completed" : "in_progress",
                  conclusion: waitCheckState.waitSatisfied ? "success" : undefined,
                  title: waitCheckState.waitPeriodLabel,
                  details: waitCheckState.waitPeriodDetails,
                });

                if (!waitCheckState.waitSatisfied) {
                  summary.waitingPullRequests += 1;
                  continue;
                }

                const evaluation = await evaluatePullRequestState({
                  repository,
                  pullRequestNumber: pullRequest.number,
                });

                if (!evaluation.ready) {
                  summary.skippedPullRequests += 1;
                  continue;
                }

                try {
                  await github.rest.pulls.merge({
                    owner: repository.owner.login,
                    repo: repository.name,
                    pull_number: pullRequest.number,
                    merge_method: "merge",
                  });
                  summary.mergedPullRequests += 1;
                } catch (error) {
                  if (error.status === 405 || error.status === 409) {
                    summary.skippedPullRequests += 1;
                    continue;
                  }

                  throw error;
                }
              }
            } catch (error) {
              failures.push(`${repository.full_name}: ${error.message}`);
            }
          }

          await core.summary
            .addHeading("Renovate merge gate")
            .addList([
              `Eligible repositories: ${summary.repositories}`,
              `Open Renovate pull requests: ${summary.renovatePullRequests}`,
              `Autoclosed stale pull requests: ${summary.autoclosedPullRequests}`,
              `Relabeled pull requests: ${summary.relabeledPullRequests}`,
              `Ignored pull requests without gate policy: ${summary.ignoredPullRequests}`,
              `Waiting pull requests: ${summary.waitingPullRequests}`,
              `Merged pull requests: ${summary.mergedPullRequests}`,
              `Skipped ready checks or merges: ${summary.skippedPullRequests}`,
            ])
            .write();

          if (failures.length > 0) {
            core.setFailed(`Merge gate failures:\n${failures.join("\n")}`);
          }
