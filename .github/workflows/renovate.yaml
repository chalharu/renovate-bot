# yamllint disable rule:comments rule:document-start rule:line-length
name: Renovate
'on':
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
concurrency: renovate
jobs:
  enumerate_repositories:
    name: Enumerate accessible repositories
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.list_repositories.outputs.matrix }}
      repository_count: ${{ steps.list_repositories.outputs.repository_count }}
      selection_map: ${{ steps.list_repositories.outputs.selection_map }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Get token
        id: get_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read
      - name: List accessible repositories
        id: list_repositories
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.get_token.outputs.token }}
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const path = require("node:path");
            const {
              buildRepositoryMatrix,
              buildRepositorySelectionMap,
              filterEligibleRepositories,
              formatPublicRepositoryEligibilityLog,
              maskPrivateRepositories,
              toEligibleRepository,
            } = require(
              path.join(
                process.env.GITHUB_WORKSPACE,
                ".github/scripts/renovate-repositories.js",
              ),
            );

            const repositories = await github.paginate(
              "GET /installation/repositories",
              {
                per_page: 100,
              },
            );
            const accessibleRepositories = (await filterEligibleRepositories({
              github,
              repositories,
              owner: context.repo.owner,
              onInspect: async ({ repository, inspection }) => {
                const logLine = formatPublicRepositoryEligibilityLog({
                  repository,
                  inspection,
                });

                if (logLine) {
                  core.info(logLine);
                }
              },
            })).map(toEligibleRepository);

            maskPrivateRepositories({
              core,
              repositories: accessibleRepositories,
            });
            core.setOutput(
              "matrix",
              JSON.stringify(buildRepositoryMatrix({
                repositories: accessibleRepositories,
              })),
            );
            core.setOutput(
              "selection_map",
              JSON.stringify(buildRepositorySelectionMap({
                repositories: accessibleRepositories,
              })),
            );
            core.setOutput(
              "repository_count",
              String(accessibleRepositories.length),
            );
  renovate:
    name: >-
      Self-hosted Renovate (${{ matrix.repository || format('private-{0}', matrix.repository_index) }})
    needs: enumerate_repositories
    if: ${{ needs.enumerate_repositories.outputs.repository_count != '0' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.enumerate_repositories.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Get repository list token
        id: get_repository_list_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read
      - name: Resolve repository details
        id: resolve_repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REPOSITORY: ${{ matrix.repository }}
          REPOSITORY_INDEX: ${{ matrix.repository_index }}
          SELECTION_MAP: >-
            ${{ needs.enumerate_repositories.outputs.selection_map }}
        with:
          github-token: ${{ steps.get_repository_list_token.outputs.token }}
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const path = require("node:path");
            const {
              formatRepositoryLogLevelLog,
              maskPrivateRepositories,
              resolveEligibleRepositorySelection,
              resolveRepositoryLogLevel,
            } = require(
              path.join(
                process.env.GITHUB_WORKSPACE,
                ".github/scripts/renovate-repositories.js",
              ),
            );
            const repositories = await github.paginate(
              "GET /installation/repositories",
              {
                per_page: 100,
              },
            );
            const selectionMap = JSON.parse(process.env.SELECTION_MAP || "[]");
            const repository = await resolveEligibleRepositorySelection({
              github,
              repositories,
              owner: context.repo.owner,
              selectionMap,
              repository: process.env.REPOSITORY,
              repositoryIndex: process.env.REPOSITORY_INDEX,
            });
            maskPrivateRepositories({ core, repositories: [repository] });
            const logLevel = resolveRepositoryLogLevel({ repository });

            if (repository.private) {
              core.info(
                "Selected private repository for Renovate (details masked).",
              );
            } else {
              core.info(
                `Selected public repository ${repository.full_name} ` +
                  "for Renovate.",
              );
            }

            const logLevelMessage = formatRepositoryLogLevelLog({
              repository,
              logLevel,
            });

            if (logLevelMessage) {
              core.info(logLevelMessage);
            }

            core.setOutput("owner", repository.owner);
            core.setOutput("repository", repository.repository);
            core.setOutput("full_name", repository.full_name);
            core.setOutput("private", repository.private ? "true" : "false");
            core.setOutput("log_level", logLevel);
      - name: Get token
        id: get_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ steps.resolve_repository.outputs.owner }}
          repositories: ${{ steps.resolve_repository.outputs.repository }}
          # Renovate reads check runs.
          # The follow-up step updates the custom stability check.
          permission-checks: write
          permission-contents: write
          permission-vulnerability-alerts: read
          permission-issues: write
          permission-pull-requests: write
          permission-statuses: write
          permission-workflows: write
      - name: Probe Dependabot alert access
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.get_token.outputs.token }}
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const path = require("node:path");
            const {
              probeDependabotAlertAccess,
            } = require(
              path.join(
                process.env.GITHUB_WORKSPACE,
                ".github/scripts/renovate-repositories.js",
              ),
            );

            const repository = {
              owner: process.env.REPOSITORY_OWNER,
              repository: process.env.REPOSITORY_NAME,
              full_name: process.env.REPOSITORY_FULL_NAME,
              private: process.env.REPOSITORY_PRIVATE === "true",
            };
            const repositoryLabel = repository.private
              ? "selected private repository"
              : `public repository ${repository.full_name}`;
            let probeResult;

            try {
              probeResult = await probeDependabotAlertAccess({
                github,
                repository,
              });
            } catch (error) {
              core.warning(
                "Dependabot alert access probe errored for " +
                  `${repositoryLabel} ` +
                  `(status: ${error?.status ?? "unknown"}). ` +
                  `${error?.message ?? "Unexpected API failure."} ` +
                  "Renovate will continue.",
              );
              return;
            }

            if (probeResult.ok) {
              core.info(
                "Dependabot alert access probe succeeded for " +
                  `${repositoryLabel}. ` +
                  `${probeResult.reason}.`,
              );
              return;
            }

            core.warning(
              `Dependabot alert access probe failed for ${repositoryLabel}. ` +
                `${probeResult.reason}. Renovate will continue.`,
            );
        env:
          REPOSITORY_FULL_NAME: >-
            ${{ steps.resolve_repository.outputs.full_name }}
          REPOSITORY_NAME: ${{ steps.resolve_repository.outputs.repository }}
          REPOSITORY_OWNER: ${{ steps.resolve_repository.outputs.owner }}
          REPOSITORY_PRIVATE: ${{ steps.resolve_repository.outputs.private }}
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          # Managed by Renovate via renovate.json customManagers.
          configurationFile: renovate.json
          docker-volumes: /tmp:/tmp
          env-regex: >-
            ^(?:RENOVATE_\w+|LOG_CONTEXT|LOG_FILE|LOG_FILE_FORMAT|LOG_FILE_LEVEL|LOG_LEVEL|GITHUB_COM_TOKEN|NODE_OPTIONS|NO_COLOR|(?:HTTPS?|NO)_PROXY|(?:https?|no)_proxy)$
          renovate-version: 43.200.1
          token: '${{ steps.get_token.outputs.token }}'
        env:
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_REQUIRE_CONFIG: "optional"
          RENOVATE_REPOSITORIES: >-
            ${{ steps.resolve_repository.outputs.full_name }}
          RENOVATE_ONBOARDING: "false"
          RENOVATE_PLATFORM_COMMIT: "true"
          RENOVATE_HOST_RULES: >-
            [{"matchHost":"dhi.io","hostType":"docker","username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}]
          LOG_CONTEXT: >-
            ${{ steps.resolve_repository.outputs.full_name }}
          LOG_FILE: /tmp/renovate-log.jsonl
          LOG_FILE_FORMAT: json
          LOG_FILE_LEVEL: trace
          LOG_LEVEL: ${{ steps.resolve_repository.outputs.log_level }}
      - name: Reconcile custom stability-days checks
        if: >-
          ${{ always() && steps.get_token.outcome == 'success' && steps.resolve_repository.outcome == 'success' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DEFAULT_WAIT_DAYS: "3"
          LOG_CONTEXT: >-
            ${{ steps.resolve_repository.outputs.full_name }}
          LOG_FILE: /tmp/renovate-log.jsonl
          REPOSITORY_NAME: ${{ steps.resolve_repository.outputs.repository }}
          REPOSITORY_OWNER: ${{ steps.resolve_repository.outputs.owner }}
          SHARED_SECRET: ${{ secrets.PRIVATE_KEY }}
        with:
          github-token: ${{ steps.get_token.outputs.token }}
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const path = require("node:path");
            const {
              processRepositoryRenovatePullRequests,
            } = require(
              path.join(
                process.env.GITHUB_WORKSPACE,
                ".github/scripts/renovate-stability-days.js",
              ),
            );

            await processRepositoryRenovatePullRequests({
              github,
              owner: process.env.REPOSITORY_OWNER,
              repo: process.env.REPOSITORY_NAME,
              secret: process.env.SHARED_SECRET,
              renovateLogFile: process.env.LOG_FILE,
              expectedLogContext: process.env.LOG_CONTEXT,
              defaultWaitDays: Number.parseInt(
                process.env.DEFAULT_WAIT_DAYS ?? "3",
                10,
              ),
              now: new Date(),
              logger: core,
            });
