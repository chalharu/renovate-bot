name: Workflow run cleanup

on:
  pull_request:
    paths:
      - '.github/scripts/workflow-run-cleanup.js'
      - '.github/scripts/workflow-run-cleanup.test.js'
      - '.github/workflows/workflow-run-cleanup.yaml'
  workflow_dispatch:
    inputs:
      keep_days:
        description: Retain this many UTC calendar days of completed workflow runs
        required: false
        default: '1'
        type: string
      dry_run:
        description: Preview deletions without removing any workflow runs
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '20 0 * * *'

concurrency:
  group: workflow-run-cleanup
  cancel-in-progress: false

jobs:
  validate_cleanup_helper:
    if: github.event_name == 'pull_request'
    name: validate cleanup helper
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run cleanup helper tests
        run: node --test .github/scripts/workflow-run-cleanup.test.js

  cleanup_runs:
    if: github.event_name != 'pull_request'
    name: cleanup runs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Delete old workflow runs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const path = require("node:path");
            const {
              computeCutoffDate,
              filterRunsToDelete,
              normalizeKeepDays,
              summarizeRunsByWorkflow,
            } = require(
              path.join(process.env.GITHUB_WORKSPACE, ".github/scripts/workflow-run-cleanup.js"),
            );

            const keepDays = normalizeKeepDays(context.payload.inputs?.keep_days, {
              fallback: 1,
            });
            const dryRun =
              String(context.payload.inputs?.dry_run ?? "false").toLowerCase() === "true";
            const cutoff = computeCutoffDate({
              now: new Date(),
              keepDays,
            });

            // GitHub caps repo-level workflow run searches at 1000 results when `status`
            // is used, so fetch the full history and keep the completed-run filtering local.
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
            );
            const scannedRunSummary = summarizeRunsByWorkflow({ runs });
            const deletableRuns = filterRunsToDelete({
              runs,
              cutoff,
            });
            const targetedRunSummary = summarizeRunsByWorkflow({
              runs: deletableRuns,
            });

            const summary = {
              workflows: scannedRunSummary.workflowCount,
              scannedRuns: runs.length,
              targetedWorkflows: targetedRunSummary.workflowCount,
              targetedRuns: deletableRuns.length,
              deletedRuns: 0,
              dryRun,
            };
            const targetedRunUrls = [];

            for (const run of deletableRuns) {
              if (targetedRunUrls.length < 50 && typeof run.html_url === "string") {
                targetedRunUrls.push(run.html_url);
              }

              if (dryRun) {
                continue;
              }

              try {
                await github.request("DELETE /repos/{owner}/{repo}/actions/runs/{run_id}", {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
                summary.deletedRuns += 1;
              } catch (error) {
                if (error.status === 404) {
                  core.warning(`Workflow run ${run.id} was already deleted before cleanup reached it`);
                  continue;
                }

                throw error;
              }
            }

            core.setOutput("cutoff", cutoff.toISOString());
            core.setOutput("deleted_runs", String(summary.deletedRuns));
            core.setOutput("targeted_runs", String(summary.targetedRuns));

            const resultsLabel = dryRun ? "Previewed runs" : "Deleted runs";
            await core.summary
              .addHeading("Workflow run cleanup")
              .addTable([
                [
                  { data: "Retained UTC days", header: true },
                  { data: String(keepDays), header: false },
                ],
                [
                  { data: "Cutoff", header: true },
                  { data: cutoff.toISOString(), header: false },
                ],
                [
                  { data: "Workflows scanned", header: true },
                  { data: String(summary.workflows), header: false },
                ],
                [
                  { data: "Runs scanned", header: true },
                  { data: String(summary.scannedRuns), header: false },
                ],
                [
                  { data: "Targeted workflows", header: true },
                  { data: String(summary.targetedWorkflows), header: false },
                ],
                [
                  { data: "Targeted runs", header: true },
                  { data: String(summary.targetedRuns), header: false },
                ],
                [
                  { data: resultsLabel, header: true },
                  { data: String(dryRun ? summary.targetedRuns : summary.deletedRuns), header: false },
                ],
              ])
              .addRaw(
                targetedRunSummary.topWorkflows.length > 0
                  ? "\nTop targeted workflows:\n"
                  : "\nNo runs matched the cleanup cutoff.\n",
              )
              .addList(
                targetedRunSummary.topWorkflows.map(
                  ({ workflow, count }) => `${workflow}: ${count}`,
                ),
              )
              .addRaw(targetedRunUrls.length > 0 ? "\nTargeted run URLs:\n" : "")
              .addList(targetedRunUrls)
              .write();

            if (dryRun) {
              core.notice(
                `Dry run complete: ${summary.targetedRuns} completed workflow runs are older than ${cutoff.toISOString()}`,
              );
            } else {
              core.notice(
                `Deleted ${summary.deletedRuns} completed workflow runs older than ${cutoff.toISOString()}`,
              );
            }
