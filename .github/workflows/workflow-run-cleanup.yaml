name: Workflow run cleanup
on:
  workflow_dispatch:
    inputs:
      keep_days:
        description: Retain this many trailing 24-hour periods of completed workflow runs
        required: false
        default: '1'
        type: string
      dry_run:
        description: Preview deletions without removing any workflow runs
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '20 */6 * * *'
concurrency:
  group: workflow-run-cleanup-${{ github.ref_name || github.ref }}
  cancel-in-progress: false
jobs:
  cleanup_runs:
    name: cleanup runs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Delete old workflow runs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const path = require("node:path");
            const MAX_SEARCH_PAGES = 10;
            const MAX_TARGETED_RUNS_PER_RUN = 3000;
            const PER_PAGE = 100;
            const SEARCH_WINDOW_LIMIT = MAX_SEARCH_PAGES * PER_PAGE;
            const {
              buildCreatedBeforeFilter,
              computeRemainingTargetedRunBudget,
              computeCutoffDate,
              filterRunsToDelete,
              normalizeKeepDays,
              summarizeRunsByWorkflow,
            } = require(
              path.join(process.env.GITHUB_WORKSPACE, ".github/scripts/workflow-run-cleanup.js"),
            );

            const inputSource = context.payload.inputs ?? {};
            const keepDays = normalizeKeepDays(inputSource.keep_days, {
              fallback: 1,
            });
            const dryRun =
              String(inputSource.dry_run ?? "false").toLowerCase() === "true";
            const cutoff = computeCutoffDate({
              now: new Date(),
              keepDays,
            });
            const created = buildCreatedBeforeFilter({ cutoff });
            const targetedRuns = [];
            const targetedRunUrls = [];
            let deletedRuns = 0;
            let oldRunTotalCount = 0;
            let scannedRuns = 0;
            let pagesScanned = 0;
            let windowsProcessed = 0;

            while (true) {
              const remainingTargetBudget = computeRemainingTargetedRunBudget({
                targetLimit: MAX_TARGETED_RUNS_PER_RUN,
                targetedRuns: targetedRuns.length,
              });
              const windowTargetLimit = Math.min(
                remainingTargetBudget,
                SEARCH_WINDOW_LIMIT,
              );

              if (remainingTargetBudget < 1) {
                break;
              }

              const candidateRuns = [];
              let windowOldRunTotalCount = 0;
              let windowScannedRuns = 0;
              let windowPagesScanned = 0;

              // GitHub caps repository run searches at 1000 results when date filters are used.
              // Re-fetch that visible window inside the same job after each delete pass so one run
              // can keep making progress until it hits the per-run cleanup cap.
              for (let page = 1; page <= MAX_SEARCH_PAGES && candidateRuns.length < windowTargetLimit; page += 1) {
                const response = await github.rest.actions.listWorkflowRunsForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: PER_PAGE,
                  page,
                  created,
                });
                const runs = response.data.workflow_runs ?? [];

                if (page === 1) {
                  windowOldRunTotalCount = response.data.total_count ?? 0;
                }

                if (runs.length === 0) {
                  break;
                }

                windowScannedRuns += runs.length;
                windowPagesScanned = page;
                candidateRuns.push(
                  ...filterRunsToDelete({
                    runs,
                    cutoff,
                  }),
                );

                if (runs.length < PER_PAGE) {
                  break;
                }
              }

              if (windowsProcessed === 0) {
                oldRunTotalCount = windowOldRunTotalCount;
              }

              scannedRuns += windowScannedRuns;
              pagesScanned += windowPagesScanned;

              if (candidateRuns.length === 0) {
                break;
              }

              const deletableRuns = [...candidateRuns]
                .sort(
                  (left, right) =>
                    Date.parse(left.updated_at) - Date.parse(right.updated_at),
                )
                .slice(0, windowTargetLimit);

              windowsProcessed += 1;

              for (const run of deletableRuns) {
                targetedRuns.push(run);

                if (targetedRunUrls.length < 50 && typeof run.html_url === "string") {
                  targetedRunUrls.push(run.html_url);
                }

                if (dryRun) {
                  continue;
                }

                try {
                  await github.request("DELETE /repos/{owner}/{repo}/actions/runs/{run_id}", {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id,
                  });
                  deletedRuns += 1;
                } catch (error) {
                  if (error.status === 404) {
                    core.warning(`Workflow run ${run.id} was already deleted before cleanup reached it`);
                    continue;
                  }

                  throw error;
                }
              }

              if (dryRun) {
                break;
              }
            }

            const targetedRunSummary = summarizeRunsByWorkflow({
              runs: targetedRuns,
            });
            const summary = {
              createdFilter: created,
              dryRun,
              oldRunTotalCount,
              pagesScanned,
              scannedRuns,
              searchWindowLimit: SEARCH_WINDOW_LIMIT,
              targetLimit: MAX_TARGETED_RUNS_PER_RUN,
              targetLimitReached: targetedRuns.length >= MAX_TARGETED_RUNS_PER_RUN,
              targetedWorkflows: targetedRunSummary.workflowCount,
              targetedRuns: targetedRuns.length,
              deletedRuns,
              windowsProcessed,
            };

            core.setOutput("cutoff", cutoff.toISOString());
            core.setOutput("deleted_runs", String(summary.deletedRuns));
            core.setOutput("targeted_runs", String(summary.targetedRuns));
            core.setOutput("target_limit_reached", String(summary.targetLimitReached));
            core.setOutput("windows_processed", String(summary.windowsProcessed));

            const resultsLabel = dryRun ? "Previewed runs" : "Deleted runs";
            await core.summary
              .addHeading("Workflow run cleanup")
              .addTable([
                [
                  { data: "Retained 24-hour periods", header: true },
                  { data: String(keepDays), header: false },
                ],
                [
                  { data: "Cutoff", header: true },
                  { data: cutoff.toISOString(), header: false },
                ],
                [
                  { data: "Search window size", header: true },
                  { data: String(summary.searchWindowLimit), header: false },
                ],
                [
                  { data: "Per-run target limit", header: true },
                  { data: String(summary.targetLimit), header: false },
                ],
                [
                  { data: "Created filter", header: true },
                  { data: summary.createdFilter, header: false },
                ],
                [
                  { data: "Initial old-run search total", header: true },
                  { data: String(summary.oldRunTotalCount), header: false },
                ],
                [
                  { data: "Windows processed", header: true },
                  { data: String(summary.windowsProcessed), header: false },
                ],
                [
                  { data: "Pages scanned", header: true },
                  { data: String(summary.pagesScanned), header: false },
                ],
                [
                  { data: "Runs scanned this run", header: true },
                  { data: String(summary.scannedRuns), header: false },
                ],
                [
                  { data: "Targeted workflows", header: true },
                  { data: String(summary.targetedWorkflows), header: false },
                ],
                [
                  { data: "Targeted runs", header: true },
                  { data: String(summary.targetedRuns), header: false },
                ],
                [
                  { data: resultsLabel, header: true },
                  { data: String(dryRun ? summary.targetedRuns : summary.deletedRuns), header: false },
                ],
                [
                  { data: "Target limit reached", header: true },
                  { data: String(summary.targetLimitReached), header: false },
                ],
              ])
              .addRaw(
                targetedRunSummary.topWorkflows.length > 0
                  ? "\nTop targeted workflows:\n"
                  : "\nNo runs matched the cleanup cutoff.\n",
              )
              .addList(
                targetedRunSummary.topWorkflows.map(
                  ({ workflow, count }) => `${workflow}: ${count}`,
                ),
              )
              .addRaw(targetedRunUrls.length > 0 ? "\nTargeted run URLs:\n" : "")
              .addList(targetedRunUrls)
              .write();

            if (dryRun) {
              core.notice(
                `Dry run complete: ${summary.targetedRuns} completed workflow runs are older than ${cutoff.toISOString()}`,
              );
            } else if (summary.targetLimitReached) {
              core.notice(
                `Deleted ${summary.deletedRuns} completed workflow runs older than ${cutoff.toISOString()} and reached the per-run cap of ${summary.targetLimit} targeted runs`,
              );
            } else {
              core.notice(
                `Deleted ${summary.deletedRuns} completed workflow runs older than ${cutoff.toISOString()}`,
              );
            }
