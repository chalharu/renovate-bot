name: Cleanup Workflow Runs
on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'
concurrency:
  group: ${{ format('cleanup-workflow-runs-{0}', github.repository) }}
  cancel-in-progress: false
permissions: {}
jobs:
  cleanup:
    name: cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs older than 1 day
        # The upstream action uses created_at rather than updated_at, so one day
        # is the closest equivalent to the previous 24-hour retention window.
        uses: Mattraks/delete-workflow-runs@b3018382ca039b53d238908238bd35d1fb14f8ee # v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: '1'
          keep_minimum_runs: '0'
