name: Deploy Worker
'on':
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-worker.yaml'
      - 'worker/src/**'
      - 'worker/package.json'
      - 'worker/package-lock.json'
      - 'worker/tsconfig.json'
      - 'worker/wrangler.toml'
concurrency:
  group: deploy-worker
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  deploy:
    name: Deploy Cloudflare Worker
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Node.js
        # v4.4.0
        uses: >-
          actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci
      - name: Deploy Worker
        id: deploy
        # v3.15.0
        uses: >-
          cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          wranglerVersion: 4.87.0
      - name: Verify deployed Worker rejects GET requests
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          status_code="$(
            curl \
              --show-error \
              --silent \
              --output /dev/null \
              --write-out '%{http_code}' \
              "$CLOUDFLARE_WORKER_URL"
          )"
          if [ "$status_code" != '405' ]; then
            printf 'Expected GET %s to return 405, got %s\n' \
              "$CLOUDFLARE_WORKER_URL" "$status_code" >&2
            exit 1
          fi
